<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrismaLife</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Meus Silos</h2>
            <ul id="silo-list">
                <li class="active">Trabalho</li>
                <li>Faculdade</li>
                <li>Pessoal</li>
            </ul>
            <button id="btn-new-silo">+ Nova Área</button>
        </aside>

        <main class="main-content">
            <header>
                <h1 id="current-silo-title">Trabalho</h1>
                <p>Gerencie suas tarefas desta área.</p>
            </header>

            <div class="task-input-area">
                <input type="text" id="new-task-input" placeholder="O que precisa ser feito?">
                <button id="btn-add-task">Adicionar</button>
            </div>

            <ul id="task-list">
                <li>
                    <input type="checkbox" id="task1">
                    <label for="task1">Terminar relatório de vendas</label>
                    <button class="btn-delete">🗑️</button>
                </li>
            </ul>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
