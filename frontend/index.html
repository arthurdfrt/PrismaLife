<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrismaLife | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>💎 PrismaLife</h1>
            <p>Nível 1 - Iniciante</p>
        </div>

        <nav class="sidebar-menu">
            <a href="#" class="filter-btn active" data-silo="all">📊 Geral (Dashboard)</a>

            <div class="sidebar-divider" style="margin: 10px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>

            <div class="sidebar-section-header">
                <span>Silos</span>
                <button id="btn-add-silo" title="Adicionar novo Silo">+</button>
            </div>

            <div id="new-silo-form" class="new-silo-form">
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="text" id="new-silo-input" class="silo-input" placeholder="Ex: 💰 Finanças" style="margin-bottom: 0;">
                    <input type="color" id="new-silo-color" value="#8b5cf6" title="Cor do Silo" style="width: 38px; height: 36px; padding: 0; border: none; border-radius: 6px; cursor: pointer; background: transparent;">
                </div>
                <div class="silo-form-actions">
                    <button id="btn-save-silo" class="btn-silo-save">Salvar</button>
                    <button id="btn-cancel-silo" class="btn-silo-cancel">Cancelar</button>
                </div>
            </div>

            <div id="silos-container" style="display: flex; flex-direction: column; gap: 10px;">
            </div>

            <div class="sidebar-divider" style="margin: 10px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>

            <a href="#" class="filter-btn" data-silo="someday">⛅ Someday</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="center-wrapper">

            <header class="content-header">
                <h2>Painel de Controle</h2>
                <p>O que vamos conquistar hoje?</p>
            </header>

            <div class="task-board">
                <h2>📜 Suas Tarefas Ativas</h2>
                <ul id="task-list">
                </ul>
            </div>

            <div class="task-creator-panel" id="task-panel">

                <div class="panel-trigger">
                    <span class="plus-icon">+</span>
                    <span class="trigger-text">Nova Tarefa</span>
                </div>

                <div class="panel-form">
                    <input type="text" id="new-task-input" placeholder="Qual é a sua próxima tarefa?">

                    <div class="options-grid">
                        <div class="input-group">
                            <label>Área da Vida (Silo)</label>
                            <select id="task-silo">
                                <option value="">Sem Silo (Geral)</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Custo de Energia</label>
                            <select id="task-energy">
                                <option value="low">🟢 Baixo (Rápido/Fácil)</option>
                                <option value="medium" selected>🟡 Médio</option>
                                <option value="high">🔴 Alto (Foco Total)</option>
                            </select>
                        </div>

                        <div class="input-group checkbox-group">
                            <label><input type="checkbox" id="task-urgent"> 🔥 É Urgente?</label>
                            <label><input type="checkbox" id="task-important"> ⭐ É Importante?</label>
                        </div>

                        <div class="input-group">
                            <label>
                                <input type="checkbox" id="task-someday"> ⛅ Someday (Talvez)
                            </label>
                            <input type="date" id="task-date">
                        </div>

                        <div class="input-group full-width">
                            <label>Link / Referência</label>
                            <input type="url" id="task-link" placeholder="https://...">
                        </div>
                    </div>

                    <div class="subtasks-section">
                        <label class="section-label">Subtarefas (Passo a passo)</label>
                        <div class="subtask-input-area">
                            <input type="text" id="subtask-input" placeholder="Adicionar um sub-passo...">
                            <button id="btn-add-subtask" type="button">➕</button>
                        </div>
                        <ul id="visual-subtask-list"></ul>
                    </div>

                    <div class="panel-actions">
                        <button id="btn-cancel" type="button" class="btn-ghost">Cancelar</button>
                        <button id="btn-add-task" class="btn-primary">Adicionar Tarefa</button>
                    </div>
                </div> </div> </div> </main>
</div> <script src="app.js"></script>
</body>
</html>
